<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>測試2</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;max-width:600px;margin:20px auto;padding:0 15px}
button{padding:15px 25px;margin:10px 0;font-size:18px;cursor:pointer;border-radius:8px;border:2px solid #4CAF50;background:#4CAF50;color:white}
#log{background:#f5f5f5;padding:15px;margin:10px 0;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.r{margin:10px 0;padding:10px;border-radius:8px;font-size:16px}
.ok{background:#e8f5e9;color:#2e7d32}
.fail{background:#ffebee;color:#c62828}
.wait{background:#fff3e0;color:#e65100}
</style>
</head>
<body>
<h2>🔬 最終測試</h2>
<p>這個測試用跟問卷送出<b>完全一樣</b>的方式（GET + no-cors）來送照片資料。</p>

<button onclick="runTest()">開始測試</button>

<div id="r1" class="r wait" style="display:none"></div>
<div id="r2" class="r wait" style="display:none"></div>
<div id="r3" class="r wait" style="display:none"></div>

<h3>📋 日誌</h3>
<div id="log">等待測試...</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw5oWLb0RGYD0oCg8qoMt_X3TSjmm0h0FvXerL3XqlSvs4A1CvtIVpxgimIP7HBegmsJQ/exec";

function log(msg){
  const el=document.getElementById('log');
  const time=new Date().toLocaleTimeString();
  el.textContent='['+time+'] '+msg+'\n'+el.textContent;
}

function show(id,cls,msg){
  const el=document.getElementById(id);
  el.style.display='block';
  el.className='r '+cls;
  el.textContent=msg;
}

async function runTest(){
  // ===== 測試 A：送一個普通的 submit（跟問卷一樣）=====
  show('r1','wait','⏳ 測試 A：送一筆問卷資料...');
  log('測試 A：用 action=submit 送一筆測試資料');
  
  var paramsA = new URLSearchParams({
    action:'submit',
    timestamp:'2026/05/01 09:99',
    customerName:'DEBUG測試請刪除',
    customerPhone:'0000000000',
    storeCode:'999',
    cnt10:'0', disc10:'0', cnt20:'0', disc20:'0',
    totalDiscount:'0',
    wantsLottery:'否'
  });
  
  try {
    await fetch(SCRIPT_URL+'?'+paramsA.toString(), {method:'GET', mode:'no-cors'});
    show('r1','ok','✅ 測試 A：submit 已送出，請去 Sheet 確認有沒有「DEBUG測試請刪除」那筆');
    log('測試 A：fetch 完成');
  } catch(e) {
    show('r1','fail','❌ 測試 A 失敗: '+e.message);
    log('測試 A 失敗: '+e.message);
  }

  // 等 3 秒讓 submit 先寫入
  await new Promise(r=>setTimeout(r,3000));

  // ===== 測試 B：送 photoChunk =====
  show('r2','wait','⏳ 測試 B：送 photoChunk...');
  log('測試 B：用 action=photoChunk 送一小塊資料');

  var paramsB = new URLSearchParams({
    action:'photoChunk',
    sid:'finaltest'+Date.now(),
    idx:'0',
    total:'1',
    data:'AAAA',
    phone:'0000000000',
    code:'999',
    name:'DEBUG測試'
  });
  
  var urlB = SCRIPT_URL+'?'+paramsB.toString();
  log('URL B 長度: '+urlB.length);
  
  try {
    await fetch(urlB, {method:'GET', mode:'no-cors'});
    show('r2','ok','✅ 測試 B：photoChunk 已送出，請去 Sheet 的 debug_log 分頁確認');
    log('測試 B：fetch 完成');
  } catch(e) {
    show('r2','fail','❌ 測試 B 失敗: '+e.message);
    log('測試 B 失敗: '+e.message);
  }

  // 等 3 秒
  await new Promise(r=>setTimeout(r,3000));

  // ===== 測試 C：用 Image tag 送 GET（完全不用 fetch）=====
  show('r3','wait','⏳ 測試 C：用 Image 方式送 photoChunk...');
  log('測試 C：用 new Image().src 送 GET（繞過 fetch）');

  var paramsC = new URLSearchParams({
    action:'photoChunk',
    sid:'imgtest'+Date.now(),
    idx:'0',
    total:'1',
    data:'BBBB',
    phone:'0000000000',
    code:'999',
    name:'IMAGE測試'
  });

  var urlC = SCRIPT_URL+'?'+paramsC.toString();
  log('URL C 長度: '+urlC.length);
  
  var img = new Image();
  img.onload = function(){ 
    show('r3','ok','✅ 測試 C：Image GET 完成（onload）');
    log('測試 C：Image onload');
  };
  img.onerror = function(){
    show('r3','ok','✅ 測試 C：Image GET 已送出（onerror 是正常的，因為回傳的不是圖片）');
    log('測試 C：Image onerror（正常，request 已送達）');
  };
  img.src = urlC;

  // 最終提示
  await new Promise(r=>setTimeout(r,5000));
  log('=== 全部測試完成 ===');
  log('請去 Sheet 確認：');
  log('1. 折扣記錄：有沒有「DEBUG測試請刪除」那筆');
  log('2. debug_log：有沒有 receiveChunk 的紀錄');
}
</script>
</body>
</html>
