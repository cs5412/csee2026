<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>v6 分塊上傳測試</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;max-width:600px;margin:20px auto;padding:0 15px}
button{padding:12px 20px;margin:8px 4px;font-size:16px;cursor:pointer;border-radius:8px;border:1px solid #ccc}
.ok{color:green;font-weight:bold}
.fail{color:red;font-weight:bold}
#log{background:#f5f5f5;padding:15px;margin:10px 0;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:400px;overflow-y:auto}
</style>
</head>
<body>
<h2>📦 v6 分塊 GET 上傳測試</h2>

<h3>測試：送一張 10x10 測試圖片（分塊 GET）</h3>
<button onclick="testChunkUpload()">開始測試</button>
<div id="result"></div>

<h3>📋 日誌</h3>
<div id="log"></div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw5oWLb0RGYD0oCg8qoMt_X3TSjmm0h0FvXerL3XqlSvs4A1CvtIVpxgimIP7HBegmsJQ/exec";

function log(msg){
  const el=document.getElementById('log');
  const time=new Date().toLocaleTimeString();
  el.textContent='['+time+'] '+msg+'\n'+el.textContent;
  console.log(msg);
}

function testChunkUpload(){
  const el=document.getElementById('result');
  el.innerHTML='⏳ 產生測試圖片...';

  // 產生 50x50 彩色測試圖片（比 10x10 大一點，更接近真實情況）
  var canvas=document.createElement('canvas');
  canvas.width=50; canvas.height=50;
  var ctx=canvas.getContext('2d');
  for(var x=0;x<50;x++){
    for(var y=0;y<50;y++){
      ctx.fillStyle='rgb('+Math.floor(x*5)+','+Math.floor(y*5)+',128)';
      ctx.fillRect(x,y,1,1);
    }
  }
  var dataUrl=canvas.toDataURL('image/jpeg',0.8);
  var b64=dataUrl.split(',')[1];
  log('測試圖片 base64 長度: '+b64.length);

  // 分塊
  var CHUNK_SIZE=7000;
  var totalChunks=Math.ceil(b64.length/CHUNK_SIZE);
  var sid=Date.now().toString(36)+Math.random().toString(36).substr(2,6);
  log('分 '+totalChunks+' 塊，sid='+sid);

  el.innerHTML='⏳ 送出 '+totalChunks+' 塊...';
  var sent=0;
  var failed=0;

  for(var i=0;i<totalChunks;i++){
    (function(idx){
      var chunk=b64.substr(idx*CHUNK_SIZE, CHUNK_SIZE);
      var params=new URLSearchParams({
        action:'photoChunk',
        sid:sid,
        idx:String(idx),
        total:String(totalChunks),
        data:chunk,
        phone:'0900000000',
        code:'999',
        name:'測試v6'
      });
      var url=SCRIPT_URL+'?'+params.toString();
      log('chunk '+idx+': len='+chunk.length+' urlLen='+url.length);

      fetch(url,{method:'GET',mode:'no-cors'})
        .then(function(){
          sent++;
          log('chunk '+idx+' 送出成功 ('+sent+'/'+totalChunks+')');
          if(sent+failed===totalChunks){
            el.innerHTML='<span class="ok">✅ 全部 '+totalChunks+' 塊已送出（失敗 '+failed+' 塊）</span><br>請到 Apps Script 執行紀錄查看結果，並檢查 Google Drive 資料夾';
          }
        })
        .catch(function(err){
          failed++;
          log('chunk '+idx+' 失敗: '+err.message);
          if(sent+failed===totalChunks){
            el.innerHTML='<span class="fail">⚠️ 送出完成，但有 '+failed+' 塊失敗</span>';
          }
        });
    })(i);
  }
}
</script>
</body>
</html>
