<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>v8 測試</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;max-width:600px;margin:20px auto;padding:0 15px}
button{padding:15px 25px;margin:10px 0;font-size:18px;cursor:pointer;border-radius:8px;border:2px solid #4CAF50;background:#4CAF50;color:white}
#log{background:#f5f5f5;padding:15px;margin:10px 0;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.ok{color:green;font-weight:bold}
.fail{color:red;font-weight:bold}
</style>
</head>
<body>
<h2>🧪 v8 測試：用 action=submit 送照片</h2>
<p>既然 action=submit 能正常觸發 doGet，那照片就搭 submit 的便車送出。</p>

<button onclick="runTest()">開始測試</button>
<div id="result"></div>

<h3>📋 日誌</h3>
<div id="log">等待測試...</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw5oWLb0RGYD0oCg8qoMt_X3TSjmm0h0FvXerL3XqlSvs4A1CvtIVpxgimIP7HBegmsJQ/exec";

function log(msg){
  const el=document.getElementById('log');
  const time=new Date().toLocaleTimeString();
  el.textContent='['+time+'] '+msg+'\n'+el.textContent;
}

async function runTest(){
  const el=document.getElementById('result');
  el.innerHTML='⏳ 產生測試圖片...';

  // 產生 50x50 測試圖
  var canvas=document.createElement('canvas');
  canvas.width=50; canvas.height=50;
  var ctx=canvas.getContext('2d');
  ctx.fillStyle='#FF6600';
  ctx.fillRect(0,0,50,50);
  ctx.fillStyle='white';
  ctx.font='20px sans-serif';
  ctx.fillText('v8',12,35);
  var dataUrl=canvas.toDataURL('image/jpeg',0.8);
  var b64=dataUrl.split(',')[1];
  log('測試圖片 base64 長度: '+b64.length);

  // 用 action=submit + photoSid 送出（搭 submit 便車）
  var sid='v8test'+Date.now();
  var params=new URLSearchParams({
    action:'submit',
    photoSid:sid,
    photoIdx:'0',
    photoTotal:'1',
    photoData:b64,
    photoPhone:'0900000000',
    photoCode:'999',
    photoName:'v8測試'
  });
  var url=SCRIPT_URL+'?'+params.toString();
  log('URL 長度: '+url.length);
  log('送出 action=submit + photoSid...');
  el.innerHTML='⏳ 送出中...';

  try{
    await fetch(url,{method:'GET',mode:'no-cors'});
    log('fetch 完成！');
    el.innerHTML='<span class="ok">✅ 已送出！請等 5 秒後去檢查：<br>1. Sheet 的 debug_log 分頁<br>2. Google Drive 照片資料夾</span>';
  }catch(e){
    log('失敗: '+e.message);
    el.innerHTML='<span class="fail">❌ 失敗: '+e.message+'</span>';
  }
}
</script>
</body>
</html>
